<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>学习平台移动端预览</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- Material Icons for icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <style>
    /* 全局变量，莫兰迪柔和色系 */
    :root {
      --primary: #5B8FF9;
      --success: #65C466;
      --warning: #F5A623;
      --error: #FF5A5F;
      --bg: #F7F9FC;
      --text: #2D3142;
      --text-grey: #8A94A6;
      --text-placeholder: #C4C9D2;
      --radius-sm: 6px;
      --radius-base: 8px;
      --radius-lg: 16px;
      --shadow: 0 6px 20px rgba(91, 143, 249, 0.08);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: #E5E7EB; /* 外部深色背景以突显手机模型 */
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Segoe UI, Arial, Roboto, 'PingFang SC', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
    }

    /* 手机模型边框与容器 */
    #app {
      width: 375px;
      height: 812px;
      background-color: var(--bg);
      border-radius: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      overflow-y: auto;
      position: relative;
      border: 8px solid #333; /* 模拟手机边框 */
      padding: 0;
      /* 隐藏滚动条但保留滚动功能 */
      scrollbar-width: none;
    }
    #app::-webkit-scrollbar { display: none; }

    .container {
      padding: 24px 20px 40px 20px;
    }

    /* 交互动效 */
    .hover-opacity { transition: opacity 0.2s ease; cursor: pointer; }
    .hover-opacity:active { opacity: 0.6; }

    .hover-scale { transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); cursor: pointer; }
    .hover-scale:active { transform: scale(0.96); }

    /* 通用卡片样式：阴影柔和、圆角分明 */
    .card-box {
      background-color: #ffffff;
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    /* 头部排版 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      padding-top: 10px;
    }
    .greeting { display: flex; flex-direction: column; }
    .title { font-size: 24px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: var(--text-grey); }
    .avatar { width: 52px; height: 52px; border-radius: 50%; border: 2px solid #fff; box-shadow: var(--shadow); object-fit: cover; }

    /* 数据看板 */
    .data-board { display: flex; gap: 12px; margin-bottom: 28px; }
    .data-card {
      flex: 1; background: #ffffff; border-radius: var(--radius-lg);
      padding: 20px 16px; box-shadow: var(--shadow);
      display: flex; flex-direction: column;
    }
    .data-value { font-size: 28px; font-weight: bold; color: var(--primary); margin-bottom: 4px; font-family: 'DIN Alternate', sans-serif; }
    .unit { font-size: 12px; font-weight: normal; margin-left: 4px; color: var(--text-grey); }
    .data-label { font-size: 13px; color: var(--text-grey); }

    /* 模块区域 */
    .section { margin-bottom: 24px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .more { font-size: 13px; color: var(--text-grey); cursor: pointer; }

    /* 宫格菜单 */
    .grid-menu { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .menu-item { display: flex; flex-direction: column; align-items: center; }
    .icon-box {
      width: 50px; height: 50px; border-radius: 16px;
      display: flex; justify-content: center; align-items: center; margin-bottom: 8px;
    }
    .icon-box i { font-size: 24px; }
    .menu-name { font-size: 13px; color: var(--text); font-weight: 500; }

    /* 错题卡片 */
    .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .tag { background-color: #F0F5FF; color: var(--primary); font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 500; }
    .date { font-size: 12px; color: var(--text-placeholder); }
    .question-title { font-size: 15px; color: var(--text); line-height: 1.5; margin-bottom: 16px; display: block; }
    .action-bar { display: flex; justify-content: flex-end; }
    
    /* 质感按钮 */
    .btn-primary {
      padding: 0 20px; height: 32px; line-height: 32px;
      background: linear-gradient(135deg, #7A9DFB 0%, #5B8FF9 100%);
      color: #ffffff; font-size: 13px; border-radius: 16px; border: none; font-weight: 500;
      box-shadow: 0 4px 12px rgba(91, 143, 249, 0.25); cursor: pointer;
    }
    .btn-primary:active { opacity: 0.9; transform: scale(0.96); }

    /* 模拟手机顶部状态栏 */
    .status-bar {
      height: 44px; display: flex; justify-content: space-between; align-items: center;
      padding: 0 24px; font-size: 14px; font-weight: 600; background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    .island { width: 100px; height: 28px; background: #000; border-radius: 14px; margin-top: -10px; }
  </style>
</head>
<body>

<div id="app">
  <div class="status-bar">
    <span>9:41</span>
    <div class="island"></div>
    <div style="display: flex; gap: 4px; align-items: center;">
      <i class="material-icons-round" style="font-size: 16px;">signal_cellular_4_bar</i>
      <i class="material-icons-round" style="font-size: 16px;">wifi</i>
      <i class="material-icons-round" style="font-size: 16px;">battery_full</i>
    </div>
  </div>

  <div class="container">
    <!-- 欢迎头部 -->
    <div class="header">
      <div class="greeting">
        <span class="title">早安，{{ userInfo.nickname || '学习者' }}</span>
        <span class="subtitle">今天是你坚持学习的第 {{ stats.consecutiveDays }} 天 ✨</span>
      </div>
      <img class="avatar" :src="userInfo.avatar" alt="avatar">
    </div>

    <!-- 核心数据面板 -->
    <div class="data-board">
      <div class="data-card hover-scale" @click="toast('查看今日数据')">
        <span class="data-value">{{ stats.totalStudyMinutes }}<span class="unit">分钟</span></span>
        <span class="data-label">今日专注时长</span>
      </div>
      <div class="data-card hover-scale" @click="toast('查看健康报告')">
        <span class="data-value">{{ healthStatus.score }}<span class="unit">分</span></span>
        <span class="data-label">坐姿健康度</span>
      </div>
    </div>

    <!-- 菜单入口 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">学习工具</span>
      </div>
      <div class="grid-menu">
        <div class="menu-item hover-opacity" v-for="(item, index) in menus" :key="index" @click="toast('导航至 ' + item.name)">
          <div class="icon-box" :style="{ backgroundColor: item.bgColor }">
            <i class="material-icons-round" :style="{ color: item.color }">{{ item.icon }}</i>
          </div>
          <span class="menu-name">{{ item.name }}</span>
        </div>
      </div>
    </div>

    <!-- 错题卡片推荐 -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">错题巩固</span>
        <span class="more hover-opacity" @click="toast('查看全部错题')">查看全部 ></span>
      </div>
      
      <div class="card-box hover-scale" v-for="q in recentQuestions" :key="q.id">
        <div class="card-top">
          <span class="tag">{{ q.subject }}</span>
          <span class="date">{{ q.date }}</span>
        </div>
        <span class="question-title">{{ q.title }}</span>
        <div class="action-bar">
          <button class="btn-primary" @click="toast('复习：' + q.title)">立即复习</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div id="toast" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;">
    提示信息
  </div>
</div>

<script>
  const { createApp, ref, onMounted } = Vue

  createApp({
    setup() {
      const userInfo = ref({ nickname: '同学', avatar: 'https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=e2e8f0' })
      const stats = ref({ consecutiveDays: 5, totalStudyMinutes: 120 })
      const healthStatus = ref({ score: 92 })
      const recentQuestions = ref([
        { id: 1, subject: '英语', title: '定语从句易错题解析与专项训练', date: '今天 10:30' },
        { id: 2, subject: '数学', title: '二次函数综合应用与压轴题', date: '昨天 15:00' }
      ])

      // 高级配色菜单配置
      const menus = [
        { name: 'AI伴学', icon: 'smart_toy', color: '#5B8FF9', bgColor: '#F0F5FF' },
        { name: '错题本', icon: 'edit_note', color: '#F5A623', bgColor: '#FFF7EB' },
        { name: '坐姿监测', icon: 'accessibility_new', color: '#65C466', bgColor: '#EFFFF0' },
        { name: '学习资源', icon: 'folder', color: '#9074FF', bgColor: '#F4F0FF' }
      ]

      const toast = (msg) => {
        const el = document.getElementById('toast')
        el.innerText = msg
        el.style.opacity = 1
        setTimeout(() => el.style.opacity = 0, 2000)
      }

      return {
        userInfo, stats, healthStatus, recentQuestions, menus, toast
      }
    }
  }).mount('#app')
</script>

</body>
</html>
